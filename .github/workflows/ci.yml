name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v1.64.8"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Verify module graph
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: go vet
        run: go vet ./...
      - name: Install golangci-lint v2.4.0
        run: |
          # Install specific version directly
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.4.0
          golangci-lint --version

      - name: Run golangci-lint
        run: |
          golangci-lint run --timeout=5m --config=.golangci.yml

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mongodb:
        image: mongo:7.0
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\").ok' --quiet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests
        env:
          REDIS_ADDR: localhost:6379
          MONGO_URI: mongodb://localhost:27017
        run: |
          go test -v -race -count=1 -timeout=120s \
            -coverprofile=coverage.out -covermode=atomic \
            ./tests/unit/...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -5

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Start integration stack
        run: docker compose up -d --remove-orphans
      - name: Wait — Redis
        run: for i in $(seq 1 30); do docker exec sluice_redis redis-cli ping 2>/dev/null | grep -q PONG && echo "Redis ready" && break; echo "waiting ($i)..."; sleep 2; done
      - name: Wait — MongoDB
        run: for i in $(seq 1 45); do docker exec sluice_mongo mongosh --eval "db.adminCommand('ping').ok" --quiet 2>/dev/null | grep -q 1 && echo "MongoDB ready" && break; echo "waiting ($i)..."; sleep 2; done
      - name: Run integration tests
        env:
          REDIS_ADDR: localhost:6379
          MONGO_URI: mongodb://localhost:27017
        run: go test -v -race -count=1 -timeout=300s -tags=integration ./tests/integration/... 2>&1 | tee /tmp/integration-test.log
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: /tmp/*.log
          retention-days: 7
      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  build-matrix:
    name: Cross-compile (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - {os: linux,   arch: amd64}
          - {os: linux,   arch: arm64}
          - {os: darwin,  arch: amd64}
          - {os: darwin,  arch: arm64}
          - {os: windows, arch: amd64}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cross-compile
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build ./...
