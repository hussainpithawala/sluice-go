version: 2

project_name: sluice

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: sluice-example-nudge
    main: ./examples/nudge/main.go
    binary: sluice-example-nudge
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    name_template: "sluice_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files: [README.md, LICENSE, CHANGELOG.md]

checksum:
  name_template: "sluice_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  abbrev: 7
  groups:
    - {title: "Breaking changes", regexp: '^.*?!:.*$', order: 0}
    - {title: "New features",     regexp: '^.*?feat(\(.+\))??!?:.*$', order: 1}
    - {title: "Bug fixes",        regexp: '^.*?fix(\(.+\))??!?:.*$', order: 2}
    - {title: "Performance",      regexp: '^.*?perf(\(.+\))??!?:.*$', order: 3}
    - {title: "Documentation",    regexp: '^.*?docs(\(.+\))??!?:.*$', order: 4}
    - {title: "Other", order: 99}
  filters:
    exclude: ["^chore:", "^ci:", "^test:", "Merge pull request", "Merge branch"]

release:
  github:
    owner: hussainpithawala
    name: sluice-go
  name_template: "v{{ .Version }}"
  header: |
    ## sluice v{{ .Version }}

    **Wide-breadth Redis-shielded write batcher for document stores.**

    ```bash
    go get github.com/hussainpithawala/sluice-go@v{{ .Version }}
    ```
  footer: |
    ---
    **Docs**: https://pkg.go.dev/github.com/hussainpithawala/sluice-go@v{{ .Version }}
  prerelease: auto
