services:

  redis:
    image: redis:7.2-alpine
    container_name: sluice_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sluice
  redis-secured:
    image: redis:7-alpine
    container_name: sluice-redis-secured
    restart: always
    ports:
      - '7379:7379'
      - '7380:7380'
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass redispassword
      --timeout 300
      --tcp-keepalive 60
      --tcp-backlog 511
      --maxclients 10000
      --save 900 1
      --save 300 10
      --save 60 10000
      --port 7379
      --tls-port 7380
      --tls-cert-file /tls/redis.crt
      --tls-key-file /tls/redis.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients no
    volumes:
      - redis_data:/data
      - ./redis/tls:/tls:ro
    environment:
      - REDIS_PASSWORD=redispassword
    healthcheck:
      test: [ "CMD", "redis-cli", "--tls", "--insecure", "-a", "redispassword", "ping", '-p', '7380' ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sluice
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M
  mongodb:
    image: mongo:7.0
    container_name: sluice_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sluice_integration
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sluice

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sluice_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sluice

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sluice_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 16
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list && kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - sluice

  localstack:
    image: localstack/localstack:3.3
    container_name: sluice_localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
      EAGER_SERVICE_LOADING: 1
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:4566/_localstack/health" ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - sluice
networks:
  sluice:
    driver: bridge
volumes:
  redis_data:
    driver: local
    name: sluice-redis-data
